name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*' # Triggers on tags like v1.0.0
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Build Web
        run: npm run build:web
        env:
          NEXT_PUBLIC_API_URL: https://gamevault-j05d.onrender.com
          NEXT_PUBLIC_SUPABASE_URL: https://jvsnjxvjkhbvlsdmsull.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp2c25qeHZqa2hidmxzZG1zdWxsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxNzg2NTMsImV4cCI6MjA5Mjc1NDY1M30.hpJdbwDo7pDFGSzZCnraEZ7Jubz5yhA8cI9z8PNMiJk
          NEXT_PUBLIC_GOOGLE_CLIENT_ID: 273551883039-ho1lhu1jbclqbhqeg73l8eoqqir1sa9g.apps.googleusercontent.com

      - name: Build API & Desktop
        run: |
          npm run build:api
          npm run build:desktop

      - name: Package Windows EXE & Upload to GitHub Releases
        run: npx electron-builder --config electron-builder.config.js --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
