name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*' # Triggers on tags like v1.0.0
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Build Web
        run: npm run build:web
        env:
          NEXT_PUBLIC_API_URL: https://gamevault-j05d.onrender.com
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}

      - name: Generate Database Client
        run: npm run db:generate

      - name: Build API & Desktop
        run: |
          npm run build:api
          npm run build:desktop

      - name: Package Windows EXE & Upload to GitHub Releases
        run: npx electron-builder --config electron-builder.config.js --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
