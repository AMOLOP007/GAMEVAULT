<!DOCTYPE html>
<html>
<head>
  <style>
    /* PERF: No CDN font loading during gaming — use local system fonts */
    /* Outfit-like stack: Segoe UI (Windows), then common sans-serif fallbacks */

    :root {
      --gold: #FFD700;
      --silver: #C0C0C0;
      --bronze: #CD7F32;
      --platinum: #E5E4E2;
      --accent: var(--gold);
    }

    body {
      margin: 0;
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      height: 110px;
      width: 400px;
      display: flex;
      align-items: flex-start;
      justify-content: flex-end;
      padding: 10px;
      box-sizing: border-box;
    }

    .trophy-container {
      position: relative;
      width: 360px;
      height: 85px;
      perspective: 1000px;
    }

    .trophy-card {
      width: 100%;
      height: 100%;
      background: rgba(10, 10, 15, 0.85);
      backdrop-filter: blur(16px);
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
      align-items: center;
      padding: 0 18px;
      box-sizing: border-box;
      transform: translateX(120%) rotateY(20deg);
      transition: all 0.7s cubic-bezier(0.19, 1, 0.22, 1);
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6), 
                  0 0 20px rgba(var(--accent-rgb), 0.15);
      overflow: hidden;
    }

    .trophy-card.show {
      transform: translateX(0) rotateY(0deg);
    }

    /* Glow Pulse */
    .trophy-card::after {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 16px;
      padding: 1px;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask-composite: xor;
      -webkit-mask-composite: destination-out;
      animation: border-pulse 3s infinite;
    }

    @keyframes border-pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.8; }
    }

    /* Shimmer Sweep */
    .shimmer {
      position: absolute;
      top: 0;
      left: -100%;
      width: 50%;
      height: 100%;
      background: linear-gradient(
        90deg,
        transparent,
        rgba(255, 255, 255, 0.1),
        rgba(255, 255, 255, 0.4),
        rgba(255, 255, 255, 0.1),
        transparent
      );
      transform: skewX(-20deg);
      pointer-events: none;
    }

    .shimmer.sweep {
      animation: sweep 1.5s ease-in-out forwards;
    }

    @keyframes sweep {
      0% { left: -100%; }
      100% { left: 200%; }
    }

    .icon-wrapper {
      width: 52px;
      height: 52px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      flex-shrink: 0;
      transform: scale(0.8);
      transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .trophy-card.show .icon-wrapper {
      transform: scale(1);
    }

    .trophy-icon {
      width: 32px;
      height: 32px;
      filter: drop-shadow(0 0 8px var(--accent));
      animation: icon-float 3s ease-in-out infinite;
    }

    @keyframes icon-float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-3px); }
    }

    .content {
      margin-left: 16px;
      flex: 1;
      min-width: 0;
    }

    .game-name {
      font-size: 10px;
      font-weight: 700;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 2px;
      opacity: 0.8;
    }

    .trophy-title {
      font-size: 16px;
      font-weight: 600;
      color: white;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 1px;
    }

    .trophy-desc {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.5);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Particle System */
    .particle {
      position: absolute;
      pointer-events: none;
      background: var(--accent);
      border-radius: 50%;
      z-index: 10;
    }

    @keyframes particle-fade {
      0% { transform: translate(0, 0) scale(1); opacity: 1; }
      100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
    }

    /* First Launch Variant */
    .variant-celebration {
      border: 1px solid rgba(255, 215, 0, 0.4);
      background: linear-gradient(135deg, rgba(20, 20, 30, 0.9), rgba(40, 30, 10, 0.9));
    }

    /* Grand Master Variant */
    .variant-grand-master {
      border: 1px solid rgba(255, 255, 255, 0.6);
      background: linear-gradient(135deg, rgba(10, 20, 40, 0.95), rgba(40, 10, 40, 0.95), rgba(10, 40, 20, 0.95));
      background-size: 400% 400%;
      animation: rainbow-bg 8s ease infinite;
      box-shadow: 0 0 40px rgba(255, 255, 255, 0.3), inset 0 0 20px rgba(255, 255, 255, 0.1);
    }

    @keyframes rainbow-bg {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
  </style>
</head>
<body>
  <div class="trophy-container">
    <div id="card" class="trophy-card">
      <div class="shimmer" id="shimmer"></div>
      <div class="icon-wrapper" id="icon-box">
        <svg class="trophy-icon" id="svg-icon" viewBox="0 0 24 24" fill="currentColor">
          <path d="M18,2H6V4H18V2M18,7V9C18,12.31 15.31,15 12,15C8.69,15 6,12.31 6,9V7C4.89,7 4,7.89 4,9V10C4,11.11 4.89,12 6,12V13.88C6,15.39 7.05,16.65 8.47,16.94L7,20H5V22H19V20H17L15.53,16.94C16.95,16.65 18,15.39 18,13.88V12C19.11,12 20,11.11 20,10V9C20,7.89 19.11,7 18,7M12,13C14.21,13 16,11.21 16,9V4H8V9C8,11.21 9.79,13 12,13Z" />
        </svg>
      </div>
      <div class="content">
        <div class="game-name" id="game-name">Cyberpunk 2077</div>
        <div class="trophy-title" id="title">Night City Legend</div>
        <div class="trophy-desc" id="desc">Complete all gigs in Watson.</div>
      </div>
    </div>
  </div>

  <script>
    const card = document.getElementById('card');
    const shimmer = document.getElementById('shimmer');
    const titleEl = document.getElementById('title');
    const descEl = document.getElementById('desc');
    const gameEl = document.getElementById('game-name');
    const iconEl = document.getElementById('svg-icon');

    function createParticles() {
      const box = document.getElementById('icon-box');
      const rect = box.getBoundingClientRect();
      const centerX = rect.width / 2;
      const centerY = rect.height / 2;
      
      for (let i = 0; i < 20; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        const size = Math.random() * 4 + 2;
        p.style.width = size + 'px';
        p.style.height = size + 'px';
        
        const angle = Math.random() * Math.PI * 2;
        const velocity = 40 + Math.random() * 60;
        const tx = Math.cos(angle) * velocity;
        const ty = Math.sin(angle) * velocity;
        
        p.style.setProperty('--tx', tx + 'px');
        p.style.setProperty('--ty', ty + 'px');
        p.style.left = centerX + 'px';
        p.style.top = centerY + 'px';
        p.style.animation = `particle-fade ${0.6 + Math.random() * 0.4}s ease-out forwards`;
        
        box.appendChild(p);
        setTimeout(() => p.remove(), 1000);
      }
    }

    window.gameVault?.onTrophyShow((data) => {
      // Reset
      card.classList.remove('show');
      card.classList.remove('variant-celebration');
      card.classList.remove('variant-grand-master');
      shimmer.classList.remove('sweep');
      
      // Set Data
      titleEl.innerText = data.title;
      descEl.innerText = data.message || data.description || '';
      gameEl.innerText = data.gameTitle || '';
      
      const color = getTrophyColor(data.type);
      document.documentElement.style.setProperty('--accent', color);
      
      // Convert hex to RGB for the box-shadow
      const rgb = hexToRgb(color);
      document.documentElement.style.setProperty('--accent-rgb', `${rgb.r}, ${rgb.g}, ${rgb.b}`);

      if (data.type === 'first_launch') {
        card.classList.add('variant-celebration');
      } else if (data.type === 'grand_master' || data.type === 'badge' && data.title.includes('Grand Master')) {
        card.classList.add('variant-grand-master');
      }

      // Show
      setTimeout(() => {
        card.classList.add('show');
        setTimeout(() => {
          shimmer.classList.add('sweep');
          createParticles();
        }, 500);
      }, 50);

      // Auto-hide is handled by main process, but we can also do it here if needed
    });

    function getTrophyColor(type) {
      switch(type?.toLowerCase()) {
        case 'gold': return '#F5C518';
        case 'silver': return '#C0C0C0';
        case 'bronze': return '#CD7F32';
        case 'platinum': return '#E5E4E2';
        case 'grand_master': return '#FFFFFF';
        case 'first_launch': return '#FFD700';
        default: return '#F5C518';
      }
    }

    function hexToRgb(hex) {
      const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
      return result ? {
        r: parseInt(result[1], 16),
        g: parseInt(result[2], 16),
        b: parseInt(result[3], 16)
      } : { r: 245, g: 197, b: 24 };
    }
  </script>
</body>
</html>
